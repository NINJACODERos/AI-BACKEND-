<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c1b19">
<title>Majdoor AI</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --concrete-900:#1c1b19; --concrete-800:#26241f; --concrete-700:#333029;
    --steel-600:#4a463c; --chalk:#ede7d9; --safety-yellow:#ffc72c;
    --rust:#c1502e; --warn-red:#d64545; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    background:var(--concrete-900);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255,199,44,0.06), transparent 40%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 10px);
    color:var(--chalk); font-family:'Work Sans', sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }

  .hazard-strip{height:8px; width:100%; flex:0 0 auto;
    background:repeating-linear-gradient(135deg, var(--safety-yellow) 0 16px, var(--concrete-900) 16px 32px);}
  header{flex:0 0 auto; padding:14px 18px 12px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--concrete-700); background:linear-gradient(180deg, var(--concrete-800), var(--concrete-900));}
  .badge{width:42px; height:42px; border-radius:8px; flex:0 0 auto; background:var(--safety-yellow); color:var(--concrete-900);
    display:flex; align-items:center; justify-content:center; font-family:'Archivo Black', sans-serif; font-size:20px;
    transform:rotate(-4deg); box-shadow:0 3px 0 rgba(0,0,0,0.35);}
  .title-block{flex:1; min-width:0;}
  h1{font-family:'Archivo Black', sans-serif; font-size:19px; margin:0; letter-spacing:0.5px; color:var(--chalk);}
  .tagline{font-size:11.5px; color:#a89f8a; margin-top:2px; font-family:'JetBrains Mono', monospace;}
  .status-dot{width:8px; height:8px; border-radius:50%; background:#5fbf6f; box-shadow:0 0 6px #5fbf6f; flex:0 0 auto;}
  .status-dot.off{background:var(--warn-red); box-shadow:0 0 6px var(--warn-red);}
  .icon-btn{background:none; border:1px solid var(--concrete-700); color:var(--chalk); width:36px; height:36px;
    border-radius:8px; font-size:16px; cursor:pointer; flex:0 0 auto;}
  .icon-btn:active{background:var(--concrete-700);}

  .chips{flex:0 0 auto; display:flex; gap:8px; padding:10px 14px; overflow-x:auto;
    border-bottom:1px solid var(--concrete-700); background:var(--concrete-800);}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; font-family:'JetBrains Mono', monospace; font-size:11.5px; padding:6px 11px;
    border-radius:100px; border:1px solid var(--steel-600); color:#cfc7b3; background:var(--concrete-900);
    white-space:nowrap; cursor:pointer;}
  .chip:active{background:var(--steel-600);}

  .chat{flex:1; overflow-y:auto; padding:16px 14px 10px; display:flex; flex-direction:column; gap:12px;}
  .empty{margin:auto; text-align:center; color:#8b8371; padding:0 30px;}
  .empty .pick{font-size:34px; display:block; margin-bottom:10px; animation:swing 2.2s ease-in-out infinite;}
  @keyframes swing{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
  .empty b{color:var(--safety-yellow); font-family:'Archivo Black',sans-serif; font-size:15px; display:block; margin-bottom:6px;}

  .msg{max-width:82%; animation:rise 0.28s ease-out;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  .msg.user{align-self:flex-end;}
  .msg.bot{align-self:flex-start;}
  .bubble{padding:11px 14px; border-radius:var(--radius); font-size:14.5px; line-height:1.48;
    word-wrap:break-word; white-space:pre-wrap;}
  .msg.user .bubble{background:var(--rust); color:#fff5ea; border-bottom-right-radius:4px; box-shadow:0 2px 0 rgba(0,0,0,0.25);}
  .msg.bot .bubble{background:var(--concrete-700); color:var(--chalk); border-bottom-left-radius:4px;
    border-left:3px solid var(--safety-yellow); box-shadow:0 2px 0 rgba(0,0,0,0.25);}
  .msg .meta{font-size:10px; color:#7a7263; margin-top:4px; font-family:'JetBrains Mono',monospace;}
  .msg.user .meta{text-align:right;}

  .img-grid{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .img-grid img{width:100%; max-height:340px; object-fit:contain; border-radius:8px;
    border:1px solid var(--steel-600); background:var(--concrete-900); cursor:pointer;}

  .lightbox{position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:30; display:none;
    align-items:center; justify-content:center; padding:16px;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%; max-height:100%; border-radius:8px;}
  .lightbox-close{position:absolute; top:16px; right:16px; width:38px; height:38px; border-radius:50%;
    background:var(--safety-yellow); color:var(--concrete-900); border:none; font-size:18px; cursor:pointer;}

  .typing{align-self:flex-start; display:flex; align-items:center; gap:6px; padding:10px 14px;
    background:var(--concrete-700); border-radius:var(--radius); border-bottom-left-radius:4px; border-left:3px solid var(--safety-yellow);}
  .brick{width:9px; height:9px; background:var(--safety-yellow); border-radius:2px; animation:stack 1s infinite ease-in-out;}
  .brick:nth-child(2){animation-delay:0.15s;}
  .brick:nth-child(3){animation-delay:0.3s;}
  @keyframes stack{0%,60%,100%{transform:translateY(0); opacity:0.5;} 30%{transform:translateY(-6px); opacity:1;}}

  .input-bar{flex:0 0 auto; display:flex; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:var(--concrete-800); border-top:1px solid var(--concrete-700);}
  #textInput{flex:1; border-radius:100px; border:1px solid var(--steel-600); background:var(--concrete-900);
    color:var(--chalk); padding:12px 16px; font-size:14.5px; font-family:inherit; outline:none;}
  #textInput:focus{border-color:var(--safety-yellow);}
  #sendBtn{width:46px; height:46px; border-radius:50%; border:none; background:var(--safety-yellow);
    color:var(--concrete-900); font-size:18px; cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center;}
  #sendBtn:active{transform:scale(0.92);}
  #sendBtn:disabled{opacity:0.4;}

  footer.app-footer{flex:0 0 auto; text-align:center; padding:6px 0 8px; font-size:11px; color:#756d5c;
    background:var(--concrete-800); border-top:1px solid var(--concrete-700);}
  footer.app-footer strong{color:#a89f8a;}

  .sheet-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; z-index:10;}
  .sheet-backdrop.open{display:block; animation:fade 0.2s ease-out;}
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  .sheet{position:fixed; left:0; right:0; bottom:0; background:var(--concrete-800); border-top:2px solid var(--safety-yellow);
    border-radius:18px 18px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom)); z-index:11;
    transform:translateY(100%); transition:transform 0.25s ease-out;}
  .sheet-backdrop.open .sheet{transform:translateY(0);}
  .sheet h2{font-family:'Archivo Black',sans-serif; font-size:15px; margin:0 0 14px;}
  .sheet label{font-size:12px; color:#a89f8a; display:block; margin-bottom:6px; font-family:'JetBrains Mono',monospace;}
  .sheet input{width:100%; padding:11px 13px; border-radius:9px; border:1px solid var(--steel-600);
    background:var(--concrete-900); color:var(--chalk); font-size:13.5px; margin-bottom:14px; outline:none;}
  .sheet input:focus{border-color:var(--safety-yellow);}
  .sheet button.save{width:100%; padding:12px; border-radius:9px; border:none; background:var(--safety-yellow);
    color:var(--concrete-900); font-weight:700; font-size:14px; cursor:pointer;}

  /* Name-entry overlay, mirrors the original "Apna naam batao majdoor bhai:" gate */
  .name-gate{position:fixed; inset:0; background:var(--concrete-900); z-index:20; display:flex;
    flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center;}
  .name-gate .pick{font-size:44px; margin-bottom:14px;}
  .name-gate h2{font-family:'Archivo Black',sans-serif; font-size:20px; margin:0 0 8px;}
  .name-gate p{color:#a89f8a; font-size:13px; margin:0 0 22px;}
  .name-gate input{width:100%; max-width:280px; padding:13px 16px; border-radius:100px; border:1px solid var(--steel-600);
    background:var(--concrete-800); color:var(--chalk); font-size:15px; text-align:center; outline:none; margin-bottom:14px;}
  .name-gate input:focus{border-color:var(--safety-yellow);}
  .name-gate button{padding:12px 30px; border-radius:100px; border:none; background:var(--safety-yellow);
    color:var(--concrete-900); font-weight:700; font-size:14px; cursor:pointer;}
</style>
</head>
<body>

  <div class="name-gate" id="nameGate">
    <div class="pick">⛏️</div>
    <h2>MAJDOOR AI</h2>
    <p>Apna naam batao majdoor bhai:</p>
    <input type="text" id="nameInputField" placeholder="Naam likh..." autocomplete="off">
    <button id="nameSubmit">Chal shuru kar</button>
  </div>

  <div class="hazard-strip"></div>
  <header>
    <div class="badge">M</div>
    <div class="title-block">
      <h1>MAJDOOR AI</h1>
      <div class="tagline">🌀 <span id="statusText">connecting...</span></div>
    </div>
    <span class="status-dot off" id="statusDot"></span>
    <button class="icon-btn" id="clearBtn" title="Clear Chat History">🗑</button>
    <button class="icon-btn" id="settingsBtn">⚙</button>
  </header>

  <div class="chips">
    <div class="chip" data-insert="img/ ">img/ photo dhoondo</div>
    <div class="chip" data-insert="dd/ ">dd/ web search</div>
    <div class="chip" data-insert="duck/ ">duck/ duck.ai</div>
  </div>

  <div class="chat" id="chat">
    <div class="empty" id="emptyState">
      <span class="pick">⛏️</span>
      <b>Majdoor ready hai, kaam bata.</b>
      Kuch bhi pooch — sarcasm free mein milega.
    </div>
  </div>

  <div class="input-bar">
    <input type="text" id="textInput" placeholder="Type your message..." autocomplete="off">
    <button id="sendBtn">➤</button>
  </div>

  <footer class="app-footer">⚡ Powered by <strong>Aman Chaudhary</strong> | Built with ❤️ &amp; sarcasm</footer>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet">
      <h2>SERVER SETTINGS</h2>
      <label>Backend URL (jahan tera FastAPI deploy hai)</label>
      <input type="text" id="backendUrl" placeholder="https://your-app.onrender.com">
      <button class="save" id="saveSettings">Save &amp; Reconnect</button>
    </div>
  </div>

<script>
  const chat = document.getElementById('chat');
  const emptyState = document.getElementById('emptyState');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const sheetBackdrop = document.getElementById('sheetBackdrop');
  const settingsBtn = document.getElementById('settingsBtn');
  const backendUrlInput = document.getElementById('backendUrl');
  const saveSettings = document.getElementById('saveSettings');
  const nameGate = document.getElementById('nameGate');
  const nameInputField = document.getElementById('nameInputField');
  const nameSubmit = document.getElementById('nameSubmit');

  let backendUrl = localStorage.getItem('majdoor_backend_url') || '';
  let userName = localStorage.getItem('majdoor_user_name') || '';
  let history = JSON.parse(sessionStorage.getItem('majdoor_history') || '[]');
  backendUrlInput.value = backendUrl;

  // ---- name gate (mirrors original text_input gate) ----
  if (userName) {
    nameGate.style.display = 'none';
  }
  nameSubmit.onclick = () => {
    const val = nameInputField.value.trim();
    if (!val) return;
    userName = val;
    localStorage.setItem('majdoor_user_name', userName);
    nameGate.style.display = 'none';
  };
  nameInputField.addEventListener('keydown', (e) => { if (e.key === 'Enter') nameSubmit.click(); });

  // ---- settings sheet ----
  function openSheet(){ sheetBackdrop.classList.add('open'); }
  function closeSheet(){ sheetBackdrop.classList.remove('open'); }
  settingsBtn.onclick = openSheet;
  sheetBackdrop.onclick = (e)=>{ if(e.target === sheetBackdrop) closeSheet(); };
  saveSettings.onclick = ()=>{
    backendUrl = backendUrlInput.value.trim().replace(/\/$/, '');
    localStorage.setItem('majdoor_backend_url', backendUrl);
    closeSheet();
    checkHealth();
  };

  // ---- clear chat (mirrors original 🪟 button) ----
  clearBtn.onclick = () => {
    history = [];
    sessionStorage.removeItem('majdoor_history');
    chat.innerHTML = '';
    chat.appendChild(emptyState);
    emptyState.style.display = 'block';
  };

  document.querySelectorAll('.chip').forEach(c=>{
    c.onclick = ()=>{ textInput.value = c.dataset.insert; textInput.focus(); };
  });

  async function checkHealth(){
    if(!backendUrl){ setStatus(false, 'no server set'); return; }
    try{
      const r = await fetch(backendUrl + '/health', {method:'GET'});
      setStatus(r.ok, r.ok ? 'online' : 'server error');
    }catch(e){ setStatus(false, 'offline'); }
  }
  function setStatus(ok, label){
    statusDot.classList.toggle('off', !ok);
    statusText.textContent = label;
  }

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');
  function openLightbox(src){ lightboxImg.src = src; lightbox.classList.add('open'); }
  lightboxClose.onclick = () => lightbox.classList.remove('open');
  lightbox.onclick = (e) => { if(e.target === lightbox) lightbox.classList.remove('open'); };

  function addMessage(role, text, images){
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);
    if(images && images.length){
      const grid = document.createElement('div');
      grid.className = 'img-grid';
      images.slice(0,10).forEach(src=>{
        const img = document.createElement('img');
        img.src = src; img.loading = 'lazy';
        img.onclick = () => openLightbox(src);
        grid.appendChild(img);
      });
      bubble.appendChild(grid);
    }
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    msg.appendChild(meta);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping(){
    const t = document.createElement('div');
    t.className = 'typing'; t.id = 'typingIndicator';
    t.innerHTML = '<div class="brick"></div><div class="brick"></div><div class="brick"></div>';
    chat.appendChild(t);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping(){ const t = document.getElementById('typingIndicator'); if(t) t.remove(); }

  async function sendMessage(){
    const text = textInput.value.trim();
    if(!text) return;
    if(!backendUrl){ openSheet(); return; }
    if(!userName){ nameGate.style.display = 'flex'; return; }

    addMessage('user', text);
    textInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try{
      const res = await fetch(backendUrl + '/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message: text, user_name: userName, history: history})
      });
      const data = await res.json();
      hideTyping();
      if(data.type === 'images'){
        addMessage('bot', data.caption || 'Ye le:', data.images);
      } else {
        addMessage('bot', data.reply || 'Kuch gadbad hai, dobara try kar.');
        history.push({role:'user', content:text});
        history.push({role:'assistant', content:data.reply});
        sessionStorage.setItem('majdoor_history', JSON.stringify(history));
      }
    }catch(e){
      hideTyping();
      addMessage('bot', 'Connection tut gaya ustad. Settings mein backend URL check kar.');
      setStatus(false, 'offline');
    }finally{
      sendBtn.disabled = false;
    }
  }

  sendBtn.onclick = sendMessage;
  textInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });

  checkHealth();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  }
</script>
</body>
</html>
